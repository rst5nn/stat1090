# Lighttpd configuration snippet for stat1090

# Redirect /stat1090 to /stat1090/
url.redirect += (
  "^/stat1090$" => "/stat1090/"
)

# Alias /stat1090/ static web assets
alias.url += (
  "/stat1090/" => "/usr/share/stat1090/html/"
)

# Proxy dynamic graph rendering API requests to stat1090 background service (port 8080)
$HTTP["url"] =~ "^/stat1090/api/" {
  proxy.server = ( "" => ( ( "host" => "127.0.0.1", "port" => 8080 ) ) )
}

# Add CORS & Cache control headers for stat1090
$HTTP["url"] =~ "^/stat1090/" {
  setenv.add-response-header += (
    "Access-Control-Allow-Origin" => "*",
    "Cache-Control" => "no-cache, no-store, must-revalidate"
  )
}
