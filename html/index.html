<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stat1090 - ADS-B Receiver Analytics</title>
    <link rel="stylesheet" href="stat.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2310b981'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Main Header -->
        <header class="main-header">
            <div class="brand-section">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>stat1090</h1>
                    <span class="sub-title">ADS-B RECEIVER ANALYTICS</span>
                </div>
            </div>
            
            <div class="header-controls">
                <button id="theme-toggle-btn" class="btn btn-theme-toggle" onclick="toggleTheme()" title="Switch theme">
                    <svg id="theme-icon-sun" class="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="theme-icon-moon" class="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span id="status-text">Connected</span>
                    <span id="last-updated" class="timestamp-badge">Updated: --:--:--</span>
                </div>
            </div>
        </header>

        <!-- Compact Control Bar -->
        <section class="control-panel">
            <form id="time-range-form" onsubmit="applyCustomRange(event)" class="control-row">
                <!-- Preset Segmented Group -->
                <div class="control-group">
                    <span class="control-label">Preset:</span>
                    <div class="btn-segmented" role="group" aria-label="Time Presets">
                        <button type="button" class="btn btn-segmented-item btn-preset active" data-range="2h" onclick="selectPreset('2h')">2h</button>
                        <button type="button" class="btn btn-segmented-item btn-preset" data-range="8h" onclick="selectPreset('8h')">8h</button>
                        <button type="button" class="btn btn-segmented-item btn-preset" data-range="24h" onclick="selectPreset('24h')">24h</button>
                    </div>
                </div>

                <!-- Custom Range Inputs -->
                <div class="control-group custom-range-group">
                    <div class="input-inline">
                        <label for="from-time" class="input-label-fixed">From:</label>
                        <input type="datetime-local" id="from-time" class="datetime-input" lang="en-GB" required>
                    </div>

                    <div class="input-inline">
                        <label for="till-time" class="input-label-fixed">Till:</label>
                        <input type="datetime-local" id="till-time" class="datetime-input" lang="en-GB" required>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary btn-sm" id="btn-apply">Apply</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="setLiveNow()" title="Set 'Till' to current time">Now</button>
                    </div>
                </div>

                <!-- Auto Refresh Segmented Group -->
                <div class="control-group refresh-group">
                    <span class="control-label">Refresh:</span>
                    <div class="btn-segmented" role="group" aria-label="Refresh Intervals">
                        <button type="button" class="btn btn-segmented-item btn-refresh" data-interval="0" onclick="setRefreshInterval(0)">Off</button>
                        <button type="button" class="btn btn-segmented-item btn-refresh active" data-interval="60" onclick="setRefreshInterval(60)">1m</button>
                        <button type="button" class="btn btn-segmented-item btn-refresh" data-interval="300" onclick="setRefreshInterval(300)">5m</button>
                    </div>
                    <button type="button" class="btn btn-icon btn-sm" onclick="refreshGraphs()" title="Refresh Graphs Now">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"></path>
                            <path d="M1 20v-6h6"></path>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </section>

        <!-- Active Window Status Sub-Bar -->
        <div class="active-window-bar">
            <div class="window-info">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="clock-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span class="info-label">Active Window:</span>
                <span id="mode-badge" class="badge badge-accent">PRESET</span>
                <span id="active-range-display" class="badge badge-subtle">Last 2 Hours</span>
            </div>
        </div>

        <!-- Main Graphs Grid (5 Dedicated Core Graphs) -->
        <main class="graphs-grid">
            <!-- 1. Signal Level Graph -->
            <article class="graph-card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="title-icon icon-emerald">
                            <path d="M2 20h20"></path>
                            <path d="M6 20v-4"></path>
                            <path d="M10 20v-8"></path>
                            <path d="M14 20v-12"></path>
                            <path d="M18 20V4"></path>
                        </svg>
                        <h2>Signal Level</h2>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-outline" onclick="saveGraphImage('signal', this)" title="Save Image PNG">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>Save</span>
                        </button>
                        <button class="btn btn-sm btn-outline" onclick="openModal('signal')" title="Full view">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
                            </svg>
                            <span>Expand</span>
                        </button>
                    </div>
                </div>
                <div class="card-body img-container" onclick="openModal('signal')">
                    <div class="loader-overlay" id="loader-signal"><div class="spinner"></div></div>
                    <img id="img-signal" src="" alt="Signal Level Graph" class="graph-img">
                </div>
            </article>

            <!-- 2. Range Graph -->
            <article class="graph-card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="title-icon icon-cyan">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="6"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                        </svg>
                        <h2>Range</h2>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-outline" onclick="saveGraphImage('range', this)" title="Save Image PNG">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>Save</span>
                        </button>
                        <button class="btn btn-sm btn-outline" onclick="openModal('range')" title="Full view">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
                            </svg>
                            <span>Expand</span>
                        </button>
                    </div>
                </div>
                <div class="card-body img-container" onclick="openModal('range')">
                    <div class="loader-overlay" id="loader-range"><div class="spinner"></div></div>
                    <img id="img-range" src="" alt="Range Graph" class="graph-img">
                </div>
            </article>

            <!-- 3. Aircraft Graph -->
            <article class="graph-card">
                <div class="card-header">
                    <div class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="title-icon icon-blue">
                            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.8-.2-1.6.1-2.1.7l-.6.6 4.9 3.5-3.1 3.1-2.4-.6c-.5-.1-1.1.1-1.4.5l-.2.2 3.1 3.1 3.1 3.1.2-.2c.4-.3.6-.9.5-1.4l-.6-2.4 3.1-3.1 3.5 4.9.6-.6c.6-.5.9-1.3.7-2.1z"></path>
                        </svg>
                        <h2>Aircraft</h2>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-outline" onclick="saveGraphImage('aircraft', this)" title="Save Image PNG">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>Save</span>
                        </button>
                        <button class="btn btn-sm btn-outline" onclick="openModal('aircraft')" title="Full view">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"></path>
                            </svg>
                            <span>Expand</span>
                        </button>
                    </div>
                </div>
                <div class="card-body img-container" onclick="openModal('aircraft')">
                    <div class="loader-overlay" id="loader-aircraft"><div class="spinner"></div></div>
                    <img id="img-aircraft" src="" alt="Aircraft Graph" class="graph-img">
                </div>
            </article>
        </main>
    </div>

    <!-- Modal Lightbox for Zoomed Graph -->
    <div id="graph-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Graph Detail</h3>
                <button class="modal-close" onclick="closeModal(null)">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modal-img" src="" alt="Expanded Graph">
            </div>
        </div>
    </div>

    <script src="stat.js"></script>
</body>
</html>
